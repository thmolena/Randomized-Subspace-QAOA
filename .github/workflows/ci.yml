name: Package CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  metadata:
    name: Metadata parity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compare root and code package metadata
        run: |
          python - <<'PY'
          from pathlib import Path
          import tomllib

          with Path("pyproject.toml").open("rb") as stream:
              root = tomllib.load(stream)["project"]
          with Path("code/pyproject.toml").open("rb") as stream:
              code = tomllib.load(stream)["project"]
          if root != code:
              raise SystemExit("root and code [project] metadata differ")
          if Path("LICENSE").read_bytes() != Path("code/LICENSE").read_bytes():
              raise SystemExit("root and code license files differ")
          PY

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            code/pyproject.toml
      - name: Install package and test dependencies
        run: python -m pip install -e "./code[dev]"
      - name: Run tests
        run: python -m pytest code/tests -q

  root-install:
    name: Root editable install
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install from the repository root
        run: python -m pip install -e ".[dev]"
      - name: Verify root installation
        run: |
          python -m pip check
          python -c "import rsqaoa; print(rsqaoa.__version__)"
          python -m pytest code/tests -q
          rsqaoa-experiment --family ring --n 4 --p 1 --steps 1 --json

  optional-backend:
    name: Optional PennyLane backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: code/pyproject.toml
      - name: Install the independent PennyLane backend
        run: python -m pip install -e "./code[dev,pennylane]"
      - name: Run the cross-backend test
        run: |
          python -m pip check
          python -m pytest code/tests/test_pennylane_backend.py -q

  released-evidence:
    name: Released evidence provenance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: code/pyproject.toml
      - name: Install package
        # The validator intentionally imports only runtime dependencies; this
        # catches accidental coupling to checkout-only plotting/config tools.
        run: python -m pip install ./code
      - name: Validate committed evidence and source provenance
        run: python code/experiments/validate_release.py

  distribution:
    name: Distribution (${{ matrix.label }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: repository root
            target: .
          - label: code directory
            target: code
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel and source distribution
        run: |
          python -m pip install "build>=1.2,<2" "twine>=5,<7"
          python -m build "${{ matrix.target }}" --outdir dist
          python -m twine check dist/*
      - name: Verify license payloads
        run: |
          python - <<'PY'
          from pathlib import Path
          import tarfile
          import zipfile

          wheel = next(Path("dist").glob("*.whl"))
          sdist = next(Path("dist").glob("*.tar.gz"))
          with zipfile.ZipFile(wheel) as archive:
              if not any(name.endswith("/licenses/LICENSE") for name in archive.namelist()):
                  raise SystemExit("wheel does not contain LICENSE")
          with tarfile.open(sdist) as archive:
              if not any(name.endswith("/LICENSE") for name in archive.getnames()):
                  raise SystemExit("source distribution does not contain LICENSE")
          PY
      - name: Install wheel and execute public command
        working-directory: ${{ runner.temp }}
        run: |
          python -m pip install "$GITHUB_WORKSPACE"/dist/*.whl
          python -m pip check
          python -c "import rsqaoa; print(rsqaoa.__version__)"
          rsqaoa-experiment --family ring --n 4 --p 1 --steps 1 --json
      - name: Reinstall from source distribution
        working-directory: ${{ runner.temp }}
        run: |
          python -m pip install --force-reinstall --no-deps "$GITHUB_WORKSPACE"/dist/*.tar.gz
          python -c "import rsqaoa; print(rsqaoa.__version__)"
          rsqaoa-experiment --help
