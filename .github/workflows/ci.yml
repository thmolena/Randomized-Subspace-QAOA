name: Package CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run tests and public command
        run: |
          python -m pytest tests -q
          python run.py demo --family ring --n 4 --p 1 --steps 1 --json

  optional-backend:
    name: Optional PennyLane backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install the independent PennyLane backend
        run: python -m pip install -e ".[dev,pennylane]"
      - name: Run the cross-backend test
        run: |
          python -m pip check
          python -m pytest tests/test_pennylane_backend.py -q

  released-evidence:
    name: Released evidence provenance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package
        run: python -m pip install .
      - name: Validate committed evidence and source provenance
        run: python run.py validate

  distribution:
    name: Build and install distribution
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheel and source distribution
        run: |
          python -m pip install "build>=1.2,<2" "twine>=5,<7"
          python -m build --outdir dist
          python -m twine check dist/*
      - name: Verify license payloads
        run: |
          python - <<'PY'
          from pathlib import Path
          import tarfile
          import zipfile

          wheel = next(Path("dist").glob("*.whl"))
          sdist = next(Path("dist").glob("*.tar.gz"))
          with zipfile.ZipFile(wheel) as archive:
              if not any(name.endswith("/licenses/LICENSE") for name in archive.namelist()):
                  raise SystemExit("wheel does not contain LICENSE")
          with tarfile.open(sdist) as archive:
              if not any(name.endswith("/LICENSE") for name in archive.getnames()):
                  raise SystemExit("source distribution does not contain LICENSE")
          PY
      - name: Install wheel and execute public command
        working-directory: ${{ runner.temp }}
        run: |
          python -m pip install "$GITHUB_WORKSPACE"/dist/*.whl
          python -m pip check
          python -c "import rsqaoa; print(rsqaoa.__version__)"
          rsqaoa-experiment --family ring --n 4 --p 1 --steps 1 --json
      - name: Reinstall from source distribution
        working-directory: ${{ runner.temp }}
        run: |
          python -m pip install --force-reinstall --no-deps "$GITHUB_WORKSPACE"/dist/*.tar.gz
          python -c "import rsqaoa; print(rsqaoa.__version__)"
          rsqaoa-experiment --help
