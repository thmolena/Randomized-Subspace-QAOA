name: Project page

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Assemble curated site artifact
        run: |
          mkdir -p _site/paper/figures _site/code/results
          cp index.html style.css script.js favicon.svg CITATION.cff _site/
          cp paper/main.pdf _site/paper/
          cp paper/figures/figure1_tradeoff.png _site/paper/figures/
          cp paper/figures/figure2_family.png _site/paper/figures/
          cp paper/figures/figure3_operator_budget.png _site/paper/figures/
          cp paper/figures/figure4_rank.png _site/paper/figures/
          cp code/results/maxcut_small.csv code/results/summary.json _site/code/results/
          test -s _site/index.html
          test -s _site/paper/main.pdf
          test -s _site/code/results/summary.json
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
