# Development-only pilot. Do not use for confirmatory inference.
protocol_schema: 1
design:
  families: [regular, er]
  n: [8, 10]
  p: [1, 2]
  graph_seeds: [41, 42]
  n_tasks: 8
  basis_n_tasks: 8
  latent_rank: 3
  drift_scale: 0.18
  persistence: 0.85
  weight_model_seed_offset: 300000
  basis_stream_seed_offset: 400000
  evaluation_stream_seed_offset: 500000
  init_seed_offset: 100000
  optimizer_seed_offset: 200000
methods:
  - full_spsa
  - amortized_none
  - amortized_fixed
  - amortized_gated
  - amortized_per_task
  - amortized_random
  - amortized_random_basis
spsa:
  steps: 40
  learning_rate: 0.12
  perturbation: 0.10
  gain_exponent: 0.602
  perturbation_exponent: 0.101
  stability: 5.0
  averages: 1
  max_step_norm: 0.40
subspace:
  rank: 8
  tolerance: 0.10
  block: 2
  norm_probes: 6
  residual_probes: 4
refresh:
  every_tasks: 2
  threshold: 0.30
  gate_probes: 1
  gate_fd_eps: 0.01
  random_probability: 0.35
evaluation:
  shots: null
  readout_error: 0.0
  measurement_seeds: [0]
output: experiments/results/amortized_development.csv
