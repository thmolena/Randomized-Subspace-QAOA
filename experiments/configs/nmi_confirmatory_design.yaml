# Local design release candidate. It is incomplete, unregistered and unrun.
protocol_schema: 3
status: design_only_incomplete_unregistered
created_on: "2026-07-16"

registration:
  required_before_execution: true
  external_receipt: null
  registry: null
  registered_artifact_sha256: null

execution_status:
  code_complete: false
  execution_permitted: false
  required_components:
    - shared_bitstring_batch_scalarization
    - physical_resource_ledger
    - dense_forward_task_subspace_reference
    - right_censored_target_hitting_utility
    - confirmatory_graph_family_runner
    - watts_strogatz_and_barabasi_albert_adapters
    - domain_separated_seed_schedule
    - full_coordinate_fd_optimizer
    - task_weighted_coordinate_fd_optimizer
    - full_task_count_and_stream_regime_orchestration
    - oracle_label_shadow_runner
    - outcome_blind_random_refresh_schedule
    - censored_primary_analysis_and_power_module
    - hardware_backend_adapter_and_calibration_capture
  implemented_components:
    - shared_bitstring_batch_scalarization
    - physical_resource_ledger
    - dense_forward_task_subspace_reference
    - right_censored_target_hitting_utility
  missing_components:
    - confirmatory_graph_family_runner
    - watts_strogatz_and_barabasi_albert_adapters
    - domain_separated_seed_schedule
    - full_coordinate_fd_optimizer
    - task_weighted_coordinate_fd_optimizer
    - full_task_count_and_stream_regime_orchestration
    - oracle_label_shadow_runner
    - outcome_blind_random_refresh_schedule
    - censored_primary_analysis_and_power_module
    - hardware_backend_adapter_and_calibration_capture

development_evidence:
  exact_csv: experiments/results/amortized_development.csv
  shot_csv: experiments/results/amortized_shot_development.csv
  role: development_only
  reusable_for_confirmatory_inference: false

confirmatory_boundary:
  training_weights_disjoint_from_evaluation_weights: true
  confirmatory_graph_seed_ids_absent_from_development: true
  outcome_dependent_exclusions_allowed: false
  outcomes_generated_or_inspected: false
  inspected_outcome_count: 0
  outcome_artifacts: []

parameter_locks:
  existing_implemented_methods:
    status: locked_to_frozen_development_configuration
    methods:
      - full_spsa
      - amortized_gated
      - amortized_per_task
      - amortized_fixed
      - amortized_random_basis
    source_protocols:
      - experiments/protocol/amortized_development.json
      - experiments/protocol/amortized_shot_development.json
    locked_fields:
      - initialization_distribution
      - spsa_gain_schedule
      - spsa_perturbation_schedule
      - spsa_step_count
      - maximum_update_norm
      - rank_cap
      - randomized_qb_tolerance_and_probe_counts
      - residual_gate_threshold_and_probe_count
    confirmatory_retuning_allowed: false
  new_controls:
    status: not_implemented_not_locked
    methods:
      - mean_weight_rank1_basis
      - unweighted_observable_jacobian_basis
      - dense_svd_oracle
      - symmetry_tied_maqaoa
      - empirical_gradient_bank_active_subspace
      - full_coordinate_fd
      - task_weighted_coordinate_fd
    tuning_inputs_allowed:
      - development_evidence_only
      - separate_pilot_graphs_excluded_from_confirmation
    confirmatory_outcomes_allowed_for_tuning: false
    freeze_receipt: null
    configuration_sha256: null
  hardware_choices:
    status: backend_not_selected_not_locked
    confirmatory_outcomes_allowed_for_tuning: false
    freeze_receipt: null
    configuration_sha256: null

primary_design:
  families: [watts_strogatz, barabasi_albert]
  graph_generators:
    watts_strogatz:
      implementation: networkx.watts_strogatz_graph
      nearest_neighbors_k: 4
      rewiring_probability: 0.30
      node_labels: consecutive_integers_from_zero
      disconnected_graphs: accepted_without_resampling
      self_loops: prohibited
      parallel_edges: prohibited
    barabasi_albert:
      implementation: networkx.barabasi_albert_graph
      attachment_edges_per_new_node_m: 3
      initial_graph: complete_graph_4_labeled_0_through_3
      node_addition_order: increasing_integer_label
      node_labels: consecutive_integers_from_zero
      self_loops: prohibited
      parallel_edges: prohibited
  n: [10, 12]
  p: 2
  graph_seed_ids: [101, 102, 103, 104, 105, 106, 107, 108, 109, 110]
  unit_construction: cartesian_product_of_family_n_and_graph_seed_id
  independent_topology_units: 40
  sample_size_status: provisional_feasibility_grid_not_powered_for_censored_primary
  task_model: low_rank_drift
  latent_rank: 3
  basis_training_tasks: 16
  evaluation_tasks: 16
  persistence: 0.85
  drift_scale: 0.18
  shots_per_circuit_point: 1024
  readout_flip_probability: 0.01
  measurement_repeats_per_unit: 2
  measurement_repeats_are_nested: true

rng_and_seed_schedule:
  status: specified_not_implemented
  derivation: sha256_domain_separated_uint32
  master_seed: 2026071601
  payload_template: "rsq-nmi-v1|{master_seed}|{purpose}|{family}|{n}|{graph_seed_id}|{depth}|{stream_regime}|{task_index}|{measurement_repeat}"
  digest_conversion: first_8_bytes_big_endian_modulo_4294967296
  purposes:
    - graph_generation
    - weight_model
    - basis_training_stream
    - evaluation_stream
    - matched_initialization
    - matched_optimizer
    - measurement
    - random_refresh_schedule
    - oracle_refresh_branch
    - oracle_no_refresh_branch
    - oracle_label_assessment
    - primary_bootstrap
    - transpilation
  graph_seed_argument: derived_graph_generation_seed_not_raw_graph_seed_id
  matched_method_pairs_share_initialization_and_stochastic_schedule: true
  measurement_repeats_change_only_measurement_seed: true
  collision_policy: abort_before_execution
  seed_manifest_required_before_execution: true
  seed_manifest_sha256: null

sample_size_and_power:
  provisional_independent_topology_units: 40
  rationale: balanced_feasibility_grid_with_10_units_per_family_size_stratum
  supports_power_claim_for_primary_endpoint: false
  primary_endpoint_power_analysis:
    required_before_external_registration: true
    status: not_performed
    frozen_independent_topology_units: null
    analysis_receipt: null
    analysis_code_sha256: null
    must_model:
      - fixed_horizon_right_censoring
      - topology_level_pairing
      - tasks_and_measurement_repeats_nested_within_topology
      - four_family_size_strata
      - twenty_percent_operational_threshold
      - attrition_and_hardware_failures

secondary_design:
  task_counts: [1, 2, 4, 8, 16, 32]
  stream_regimes:
    - low_rank_drift
    - changepoint
    - iid_full_rank
    - loading_shift_ood
  depths: [2, 3]
  shot_allocations: [256, 1024]
  readout_flip_probabilities: [0.0, 0.01, 0.03]
  exact_statevector_sensitivity_analysis: true

methods:
  required:
    - full_spsa
    - amortized_gated
    - amortized_per_task
    - amortized_fixed
    - amortized_random_basis
    - mean_weight_rank1_basis
    - unweighted_observable_jacobian_basis
    - dense_svd_oracle
    - symmetry_tied_maqaoa
    - empirical_gradient_bank_active_subspace
    - full_coordinate_fd
    - task_weighted_coordinate_fd
  same_initialization_within_unit: true
  same_optimizer_schedule_within_matched_pair: true
  rank_cap: 8
  primary_comparison:
    experimental: task_weighted_coordinate_fd
    comparator: full_coordinate_fd
    paired_inputs:
      - graph_topology
      - task_weights
      - initialization
      - optimizer_hyperparameters
      - stochastic_schedule

random_refresh_control:
  source: frozen_exact_development_gated_refresh_rate
  source_refresh_events: 100
  source_refresh_opportunities: 112
  source_probability: 0.8928571428571429
  primary_schedule: select_exactly_134_of_150_topology_transition_slots_per_family_size_stratum
  primary_slots_per_stratum: 150
  primary_refreshes_per_stratum: 134
  sampling: uniform_without_replacement_before_any_confirmatory_outcome
  schedule_seed_purpose: random_refresh_schedule
  schedule_shared_across_measurement_repeats: true
  confirmatory_gated_events_used_to_set_schedule: false
  schedule_manifest_required_before_execution: true

oracle_gate_labels:
  transition: evaluation_task_t_to_t_plus_1_for_t_0_through_14
  anchor: frozen_post_optimization_state_after_task_t
  construction_weights: independent_basis_training_bank_only
  branches: [refresh_recycled_basis, retain_existing_basis]
  branch_state: cloned_anchor_basis_optimizer_state_and_rng_schedule
  common_random_numbers_across_branches: true
  downstream_optimizer_updates: 40
  label_assessment:
    independent_bitstring_batch_per_branch: true
    shots_per_branch: 4096
    seed_purpose: oracle_label_assessment
    ratio_denominator: exact_bruteforce_weighted_maxcut
  improvement_threshold: 0.005
  positive_event: refreshed_minus_unrefreshed_next_task_ratio_at_least_0.005
  labels_generated_after_primary_trajectories_and_gate_decisions_are_frozen: true
  labels_or_branch_outcomes_may_change_primary_trajectories: false
  labels_or_branch_outcomes_may_tune_gate_on_same_topology: false
  calibration_evaluation: leave_one_topology_out_cross_fitting
  oracle_branch_resources: separate_audit_ledger_excluded_from_deployed_method_cost

resource_accounting:
  circuit_point_definition: one_compiled_circuit_parameter_vector
  all_edge_observables_share_one_bitstring_batch: true
  task_scalarizations_share_batch_only_at_identical_parameter_vectors: true
  distinct_parameter_vectors_are_never_merged: true
  scalar_objective_points: separate
  vector_observable_points: separate
  physical_shots: required
  compiled_two_qubit_gates: required_for_hardware_stage
  qpu_wall_time: required_for_hardware_stage
  simulator_vjp_to_physical_query_conversion: prohibited
  setup_refresh_gate_and_target_assessment_costs_included: true
  right_censor_unreached_targets: true
  overhead_attribution:
    initial_basis_construction: evaluation_task_0
    transition_gate_and_refresh: next_evaluation_task
    prorating_or_omitting_overhead: prohibited
    sum_of_task_local_ledgers_must_equal_stream_ledger: true

outcomes:
  primary_estimand:
    name: topology_paired_difference_in_restricted_mean_circuit_points_to_target
    target_approximation_ratio: 0.80
    fixed_horizon_forward_circuit_points_per_task: 8192
    target_assessment:
      timing: initialization_and_after_each_complete_optimizer_update
      independent_of_gradient_batches: true
      shots: 1024
      included_in_resource_clock: true
      next_atomic_action_started_if_it_exceeds_horizon: false
    event_time: first_included_assessment_at_or_above_target
    non_hit_treatment: assign_fixed_horizon_and_include_in_restricted_mean
    technical_missingness: never_recode_as_target_non_hit
    repeat_aggregation: mean_restricted_cost_over_two_measurement_repeats_within_task
    task_aggregation: mean_over_16_evaluation_tasks_within_topology
    sampling_unit: graph_topology
    population_aggregation: equal_weight_mean_over_four_family_size_strata
    paired_contrast: experimental_minus_comparator
    sign_convention: negative_favors_task_weighted_coordinate_fd
    uncertainty: family_size_stratified_topology_cluster_bootstrap
    bootstrap_replicates: 9999
    bootstrap_seed_purpose: primary_bootstrap
  primary_operational_effect:
    name: ratio_of_stratum_weighted_mean_restricted_costs
    success_threshold: 0.80
  primary_shot_estimand:
    definition: identical_restricted_target_hitting_construction_on_physical_shots
    fixed_horizon_shots_per_task: 8388608
    non_hit_treatment: assign_fixed_shot_horizon_and_include_in_restricted_mean
  secondary_targets: [0.75, 0.85]
  quality_estimand: paired_topology_mean_approximation_ratio_difference_at_fixed_resource_horizon
  quality_equivalence_margin: 0.01
  quality_vs_shot_auc: required
  retained_gradient_energy: required
  principal_angle_drift: required
  optimization_gain_conditional_on_representation_metrics: required
  gate_metrics: [auroc, brier_score, calibration_slope, calibration_intercept]

analysis:
  sampling_unit: graph_topology
  cluster_tasks_depths_and_measurement_repeats_within_topology: true
  paired_analysis: true
  confidence_level: 0.95
  multiplicity: holm_for_prespecified_secondary_comparisons
  missingness: report_separately_without_outcome_dependent_removal_or_reclassification
  report_every_family_size_depth_and_stream_stratum: true
  primary_endpoint_power_or_precision_claim_currently_allowed: false

success_rule:
  status: provisional_until_primary_endpoint_power_analysis_is_frozen
  all_conditions_required: true
  conditions:
    - frozen_primary_analysis_rejects_no_operational_saving_at_the_registered_alpha
    - stratum_weighted_restricted_circuit_point_cost_ratio_at_most_0.80
    - stratum_weighted_restricted_shot_cost_ratio_at_most_0.80
    - fixed_horizon_quality_is_within_registered_equivalence_margin
    - gate_calibration_improves_over_precommitted_random_refresh_schedule
    - operational_result_replicates_in_hardware_stage

hardware_stage:
  required_for_deployment_or_hardware_efficiency_claim: true
  status: not_executed
  minimum_independent_backends: 1
  calibration_snapshot_required: true
  transpilation_seed_recorded: true
  queue_and_execution_time_recorded: true

publication_claim_guardrails:
  quantum_advantage_claim_allowed: false
  hardware_efficiency_claim_allowed_before_hardware_stage: false
  query_advantage_claim_allowed_from_parameter_compression_alone: false
  negative_or_null_result_must_be_reported: true

protocol_sha256: 07087cbdbac3a019889d0b8f1166fff9dd27301287d706f53439335a75d5388a
